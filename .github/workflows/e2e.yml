name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      DATABASE_URL: ./data/test.db
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_ZGV2LWR1bW15LmNsZXJrLmFjY291bnRzLmRldiQ=' }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_ZGV2LWR1bW15LmNsZXJrLmFjY291bnRzLmRldiQ=' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run all checks (lint + typecheck + E2E)
        run: bun run check

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
